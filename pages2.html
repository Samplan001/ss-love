<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

/* Анимация появления */
.container {
    text-align: center;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    margin-bottom: 20px;
    font-size: 28px;
}

/* Видео */
iframe {
    width: 80vw;
    max-width: 700px;
    height: 400px;
    border-radius: 20px;
    border: none;
    box-shadow: 0 20px 50px rgba(255,0,80,0.5);
}

/* Кнопка назад */
.back {
    margin-top: 25px;
    padding: 12px 25px;
    border-radius: 12px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

.back:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container">
    <h1>Это для тебя ❤️</h1>

    <iframe src="https://www.youtube.com/embed/sGZuo_BC7Dg" allowfullscreen></iframe>

    <div class="back" onclick="goBack()">Назад</div>
</div>

<script>
function goBack() {
    document.body.style.opacity = "0";
    setTimeout(() => {
        window.location.href = "index.html";
    }, 500);
}
</script>

</body>
</html>
